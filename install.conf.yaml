- defaults:
    link:
      relink: true

- clean: ["~"]

- link:
    ~/.xinitrc: xorg/xinitrc
    ~/.Xresources: xorg/Xresources
    ~/.Xmodmap: xorg/Xmodmap
    ~/.imwheelrc: xorg/imwheelrc
    ~/.config/qtile: qtile
    ~/.config/qtile/autostart.sh: xorg/autostart.sh
    ~/.zshrc: zsh/zshrc
    ~/.config/nvim: nvim

- create:
    - ~/.config/qtile
    - ~/.config/nvim/autoload
    - ~/.config/nvim/undodir

- shell:
    - [git submodule update --init --recursive, Installing submodules]
