- defaults:
    link:
      relink: true

- clean: ["~"]

- link:
    ~/.xinitrc: xorg/xinitrc
    ~/.Xresources: xorg/Xresources
    ~/.Xmodmap: xorg/Xmodmap
    ~/.imwheelrc: xorg/imwheelrc
    ~/.config/qtile: qtile
    ~/.config/qtile/autostart.sh: xorg/autostart.sh
    ~/.config/awesome: awesome
    ~/.config/awesome/autostart.sh: xorg/autostart.sh
    ~/.config/alacritty: alacritty
    ~/.config/rofi: rofi
    ~/.zshrc: zsh/zshrc
    ~/.bashrc: bash/bashrc
    ~/.bash_profile: bash/bash_profile
    ~/.inputrc: bash/inputrc
    ~/.config/nvim: nvim

- create:
    - ~/.config/qtile
    - ~/.config/nvim/autoload
    - ~/.config/nvim/undodir

- shell:
    - [git submodule update --init --recursive, Installing submodules]
