- defaults:
    link:
      relink: true

- clean: ["~"]

- link:
    ~/.xinitrc: xorg/xinitrc
    ~/.Xresources: xorg/Xresources
    ~/.Xmodmap: xorg/Xmodmap
    ~/.imwheelrc: xorg/imwheelrc
    ~/.xprofile: xorg/xprofile
    ~/.config/qtile: qtile
    ~/.config/awesome: im-awesome
    ~/.config/alacritty: alacritty
    ~/.config/rofi: rofi
    ~/.zshrc: zsh/zshrc
    ~/.bashrc: bash/bashrc
    ~/.bash_profile: bash/bash_profile
    ~/.inputrc: bash/inputrc
    ~/.config/nvim: nvim
    ~/.config/VSCodeNeovim: VSCodeNeovim
    ~/.config/zathura: zathura

- create:
    - ~/.config/nvim/autoload
    - ~/.config/nvim/undodir

- shell:
    - [git submodule update --init --recursive, Installing submodules]
